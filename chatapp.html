<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ChatApp">
<title>💬 ChatApp</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#222240;--accent:#6c63ff;--accent2:#ff6584;--green:#00d084;--text:#f0f0ff;--text2:#8888aa;--border:rgba(108,99,255,0.2);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);}
/* ── 로그인 ── */
#login-screen{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0f1a,#1a1a2e);padding:20px;}
.login-box{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:28px;padding:40px 32px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px;align-items:center;box-shadow:0 0 60px rgba(108,99,255,0.15);}
.login-logo{font-size:3rem;}
.login-title{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;}
.login-sub{font-size:0.82rem;color:var(--text2);text-align:center;}
.inp{width:100%;padding:13px 18px;border-radius:14px;border:1.5px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;user-select:text;-webkit-user-select:text;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--text2);}
.login-btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--accent),#9b59b6);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.login-btn:active{transform:scale(0.97);}
.err-msg{font-size:0.8rem;color:var(--accent2);text-align:center;min-height:16px;}
/* ── 앱 ── */
#app{display:none;flex-direction:row;height:100vh;width:100vw;}
#app.show{display:flex;}
/* ── 사이드바 ── */
#sidebar{width:64px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px;flex-shrink:0;}
.side-btn{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;transition:all 0.15s;border:none;background:none;color:var(--text2);position:relative;}
.side-btn:hover{background:rgba(108,99,255,0.15);color:var(--text);}
.side-btn.active{background:rgba(108,99,255,0.25);color:var(--accent);}
.side-badge{position:absolute;top:-3px;right:-3px;background:var(--accent2);color:#fff;font-size:0.55rem;font-weight:700;border-radius:50%;width:16px;height:16px;display:none;align-items:center;justify-content:center;border:2px solid var(--surface);}
.side-badge.show{display:flex;}
.side-av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;border:2px solid var(--border);margin-top:auto;overflow:hidden;transition:border-color 0.15s;}
.side-av:hover{border-color:var(--accent);}
.side-av img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
/* ── 패널 ── */
#panel{width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.p-header{padding:16px 16px 12px;font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.p-list{flex:1;overflow-y:auto;}
.p-search{padding:10px 12px;border-bottom:1px solid var(--border);}
.srch{width:100%;padding:8px 14px;border-radius:20px;border:none;background:rgba(255,255,255,0.07);color:var(--text);font-size:0.85rem;outline:none;font-family:'Noto Sans KR',sans-serif;user-select:text;-webkit-user-select:text;}
.srch::placeholder{color:var(--text2);}
.new-btn{background:var(--accent);border:none;color:#fff;border-radius:11px;padding:6px 13px;font-size:0.8rem;font-weight:700;cursor:pointer;}
/* 채팅방 아이템 */
.ri{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid rgba(255,255,255,0.04);}
.ri:hover{background:rgba(108,99,255,0.08);}
.ri.active{background:rgba(108,99,255,0.15);}
.ri-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;overflow:hidden;}
.ri-icon img{width:100%;height:100%;object-fit:cover;}
.ri-info{flex:1;min-width:0;}
.ri-name{font-weight:700;font-size:0.87rem;margin-bottom:2px;}
.ri-prev{font-size:0.73rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ri-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.ri-time{font-size:0.61rem;color:var(--text2);}
.ri-badge{background:var(--accent);color:#fff;font-size:0.59rem;font-weight:700;border-radius:50%;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
/* 친구 */
.fi{display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;transition:background 0.1s;}
.fi:hover{background:rgba(108,99,255,0.08);}
.fi-av{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;overflow:hidden;}
.fi-av img{width:100%;height:100%;object-fit:cover;}
.fi-name{font-weight:700;font-size:0.87rem;}
.fi-status{font-size:0.71rem;color:var(--text2);margin-top:1px;}
.fi-score{font-size:0.74rem;color:var(--accent);font-weight:700;}
.sec-label{padding:10px 13px 4px;font-size:0.7rem;color:var(--text2);letter-spacing:1px;font-weight:700;}
/* ── 메인 ── */
#main{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text2);}
/* 채팅 헤더 */
#ch-header{display:none;align-items:center;gap:12px;padding:13px 17px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.ch-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;flex-shrink:0;}
.ch-av img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;}
.ch-name{font-weight:700;font-size:0.93rem;}
.ch-sub{font-size:0.7rem;color:var(--text2);margin-top:1px;}
.ch-btns{display:flex;gap:6px;}
.ch-btn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.07);color:var(--text2);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.ch-btn:hover{background:rgba(108,99,255,0.2);color:var(--accent);}
/* 메시지 */
#msgs{display:none;flex:1;overflow-y:auto;padding:14px 17px;flex-direction:column;gap:10px;}
#msgs::-webkit-scrollbar{width:3px;}
#msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}
.mw{display:flex;gap:9px;align-items:flex-end;}
.mw.me{flex-direction:row-reverse;}
.mw.sys{justify-content:center;}
.m-av{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:0.88rem;flex-shrink:0;cursor:pointer;overflow:hidden;}
.m-av img{width:100%;height:100%;object-fit:cover;}
.m-body{display:flex;flex-direction:column;gap:2px;max-width:68%;}
.mw.me .m-body{align-items:flex-end;}
.m-nick{font-size:0.62rem;color:var(--text2);font-weight:700;margin-bottom:1px;}
.m-bbl{padding:9px 13px;border-radius:17px;font-size:0.87rem;line-height:1.5;word-break:break-word;cursor:pointer;}
.mw.me .m-bbl{background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.mw.other .m-bbl{background:var(--surface2);color:var(--text);border-bottom-left-radius:4px;}
.mw.sys .m-bbl{background:rgba(255,255,255,0.05);color:var(--text2);font-size:0.7rem;border-radius:20px;padding:3px 12px;}
.m-meta{display:flex;align-items:center;gap:3px;}
.m-time{font-size:0.58rem;color:var(--text2);}
.m-img{max-width:200px;border-radius:13px;cursor:pointer;display:block;}
.m-reacts{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
.m-react{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:2px 7px;font-size:0.72rem;cursor:pointer;}
.date-sep{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:0.69rem;margin:5px 0;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}
/* 입력창 */
#inp-area{display:none;padding:10px 13px;background:var(--surface);border-top:1px solid var(--border);flex-direction:column;gap:7px;}
.emoji-area{display:none;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:5px;font-size:1.3rem;}
.e-item{cursor:pointer;padding:3px;border-radius:7px;transition:background 0.1s;}
.e-item:hover{background:rgba(255,255,255,0.1);}
.inp-row{display:flex;align-items:center;gap:7px;}
.i-btn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,0.07);color:var(--text2);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.i-btn:hover{background:rgba(108,99,255,0.2);color:var(--accent);}
#msg-input{flex:1;padding:9px 14px;border-radius:20px;border:1.5px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text);font-size:0.87rem;outline:none;font-family:'Noto Sans KR',sans-serif;transition:border-color 0.2s;user-select:text;-webkit-user-select:text;}
#msg-input:focus{border-color:var(--accent);}
#msg-input::placeholder{color:var(--text2);}
#send-btn{width:40px;height:40px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
#send-btn:active{transform:scale(0.93);}
/* ── 피드 ── */
.feed-list{flex:1;overflow-y:auto;padding:12px;}
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;margin-bottom:14px;overflow:hidden;}
.post-head{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.post-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;flex-shrink:0;cursor:pointer;}
.post-av img{width:100%;height:100%;object-fit:cover;}
.post-nick{font-weight:700;font-size:0.87rem;}
.post-time{font-size:0.67rem;color:var(--text2);margin-top:1px;}
.post-img{width:100%;max-height:360px;object-fit:cover;cursor:pointer;display:block;}
.post-text{padding:12px 14px;font-size:0.87rem;line-height:1.5;}
.post-acts{display:flex;align-items:center;gap:10px;padding:8px 14px 10px;}
.like-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;gap:4px;color:var(--text2);transition:color 0.15s;}
.like-btn.liked{color:var(--accent2);}
.like-cnt{font-size:0.79rem;color:var(--text2);}
.cmt-btn{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:4px;}
.cmt-cnt{font-size:0.79rem;color:var(--text2);}
.post-cmts{padding:0 14px 10px;display:flex;flex-direction:column;gap:5px;}
.cmt-item{font-size:0.79rem;color:var(--text);}
.cmt-nick{font-weight:700;color:var(--accent);margin-right:4px;}
.cmt-row{display:flex;gap:7px;padding:0 14px 12px;}
.cmt-inp{flex:1;padding:7px 12px;border-radius:13px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.81rem;outline:none;font-family:'Noto Sans KR',sans-serif;user-select:text;-webkit-user-select:text;}
.cmt-inp::placeholder{color:var(--text2);}
.cmt-send{background:var(--accent);border:none;color:#fff;border-radius:10px;padding:7px 12px;font-size:0.77rem;cursor:pointer;font-weight:700;}
/* ── 모달 ── */
.overlay{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;padding:18px;}
.overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:22px;width:100%;max-width:380px;padding:22px;display:flex;flex-direction:column;gap:13px;}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;}
.m-btn{padding:12px;border-radius:13px;border:none;font-weight:700;font-size:0.88rem;cursor:pointer;transition:all 0.15s;}
.m-btn.primary{background:var(--accent);color:#fff;}
.m-btn.secondary{background:rgba(255,255,255,0.07);color:var(--text);}
.m-btn:active{transform:scale(0.97);}
.member-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;}
.mi{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:11px;background:rgba(255,255,255,0.04);cursor:pointer;transition:background 0.1s;}
.mi:hover{background:rgba(108,99,255,0.1);}
.mi.sel{background:rgba(108,99,255,0.2);border:1px solid rgba(108,99,255,0.4);}
.mi-chk{margin-left:auto;color:var(--accent);}
/* ── 프로필 팝업 ── */
#pp{display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.65);align-items:flex-end;justify-content:center;}
#pp.show{display:flex;}
.pc{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-width:420px;overflow:hidden;animation:sUp 0.3s ease;}
@keyframes sUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.pc-bg{height:165px;display:flex;align-items:flex-end;padding:14px;}
.pc-av{width:60px;height:60px;border-radius:17px;border:3px solid rgba(255,255,255,0.3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.8rem;}
.pc-av img{width:100%;height:100%;object-fit:cover;}
.pc-info{padding:14px 18px;}
.pc-name{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;}
.pc-status{font-size:0.8rem;color:var(--text2);margin-top:3px;}
.pc-score{font-size:0.82rem;color:var(--accent);font-weight:700;margin-top:5px;}
.pc-btns{display:flex;gap:8px;padding:0 18px 20px;}
.pc-btn{flex:1;padding:11px;border-radius:13px;border:none;font-weight:700;font-size:0.87rem;cursor:pointer;}
.pc-btn.call{background:var(--green);color:#fff;}
.pc-btn.dm{background:var(--accent);color:#fff;}
.pc-btn.cls{background:rgba(255,255,255,0.07);color:var(--text);}
/* ── 통화 ── */
#call-screen{display:none;position:fixed;inset:0;z-index:850;background:linear-gradient(135deg,#1a1a2e,#0f0f1a);flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#call-screen.show{display:flex;}
.call-av{width:96px;height:96px;border-radius:26px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;border:3px solid rgba(108,99,255,0.4);animation:pls 2s infinite;overflow:hidden;}
.call-av img{width:100%;height:100%;object-fit:cover;}
@keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(108,99,255,0.4);}50%{box-shadow:0 0 0 18px rgba(108,99,255,0);}}
.call-name{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;}
.call-st{font-size:0.82rem;color:var(--text2);}
.call-timer{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;color:var(--green);display:none;}
.call-btns{display:flex;gap:18px;margin-top:16px;}
.c-btn{width:62px;height:62px;border-radius:50%;border:none;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.c-btn:active{transform:scale(0.91);}
.c-btn.end{background:#ef4444;color:#fff;}
.c-btn.mute{background:rgba(255,255,255,0.1);color:var(--text);}
.c-btn.muted{background:var(--accent2);}
/* 인커밍 */
#inc-call{display:none;position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:1000;background:var(--surface2);border:1px solid var(--border);border-radius:17px;padding:13px 16px;width:265px;box-shadow:0 14px 45px rgba(0,0,0,0.5);animation:sDown 0.3s ease;}
@keyframes sDown{from{transform:translateX(-50%) translateY(-18px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
#inc-call.show{display:block;}
.inc-head{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
.inc-av{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;overflow:hidden;}
.inc-av img{width:100%;height:100%;object-fit:cover;}
.inc-name{font-weight:700;font-size:0.92rem;}
.inc-sub{font-size:0.71rem;color:var(--text2);}
.inc-btns{display:flex;gap:8px;}
.inc-btn{flex:1;padding:9px;border-radius:12px;border:none;font-weight:700;font-size:0.84rem;cursor:pointer;}
.inc-btn.acc{background:var(--green);color:#fff;}
.inc-btn.rej{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);}
/* 반응 피커 */
.rpicker{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:7px 11px;display:flex;gap:7px;z-index:999;box-shadow:0 10px 35px rgba(0,0,0,0.45);animation:fIn 0.15s ease;}
@keyframes fIn{from{opacity:0;transform:scale(0.88);}to{opacity:1;transform:scale(1);}}
.r-item{font-size:1.3rem;cursor:pointer;padding:3px;border-radius:7px;transition:background 0.1s;}
.r-item:hover{background:rgba(255,255,255,0.1);}
/* 내 프로필 */
.my-bg{height:170px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:16px;cursor:pointer;}
.my-av{width:74px;height:74px;border-radius:21px;display:flex;align-items:center;justify-content:center;font-size:2.1rem;border:3px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.08);overflow:hidden;}
.my-av img{width:100%;height:100%;object-fit:cover;}
.my-name{font-family:'Space Grotesk',sans-serif;font-size:1.25rem;font-weight:700;text-align:center;padding:12px 12px 3px;}
.my-status{font-size:0.82rem;color:var(--text2);text-align:center;cursor:pointer;padding:3px 14px 14px;}
.my-opts{padding:13px;display:flex;flex-direction:column;gap:5px;}
.my-opt{padding:13px 15px;border-radius:13px;background:rgba(255,255,255,0.05);font-size:0.87rem;cursor:pointer;display:flex;align-items:center;gap:9px;transition:background 0.1s;}
.my-opt:hover{background:rgba(108,99,255,0.15);}
.my-opt.danger{color:#ef4444;}
textarea.inp{resize:none;height:88px;line-height:1.5;}
@keyframes pong{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:0.6}100%{transform:scale(0);opacity:0}}
.pong{animation:pong 0.45s ease forwards;}
@media(max-width:600px){#panel{display:none;width:100%;position:fixed;inset:0;z-index:500;}#panel.ms{display:flex;}#sidebar{width:56px;}}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">💬</div>
    <div class="login-title">ChatApp</div>
    <div class="login-sub">닉네임과 비밀번호로 시작하세요</div>
    <input class="inp" id="inp-nick" type="text" placeholder="닉네임" maxlength="12" autocomplete="off">
    <input class="inp" id="inp-pass" type="password" placeholder="비밀번호" maxlength="20" autocomplete="off">
    <div class="err-msg" id="lerr"></div>
    <button class="login-btn" onclick="doLogin()">🚀 시작하기</button>
  </div>
</div>

<!-- 앱 -->

  const nick=document.getElementById('inp-nick').value.trim();

  if(!nick){err.textContent='닉네임을 입력해주세요!';return;}

  const passes=getPasses();
  if(passes[nick]!==undefined&&passes[nick]!==pass){err.textContent='비밀번호가 틀렸어요!';return;}
  passes[nick]=pass;setPasses(passes);

async function pollMsgs(){

// ── 음성 통화 (WebRTC) ──
let pc=null,localStream=null,callTarget=null,callTimer=null,callSec=0,isMuted=false;
const ck=(a,b)=>['call',...[a,b].sort()].join('_');

async function startCall(){
  if(!curRoomData||curRoomData.is_group){alert('1대1 채팅에서만 통화 가능해요!');return;}
  const others=(curRoomData.members||[]).filter(m=>m!==CU);
  if(others.length)startCallTo(others[0]);
}
async function startCallTo(nick){
  callTarget=nick;lastSigId=0;
  const room=ck(CU,nick);await clearSigs(room);
  showCallUI(nick,'📞 연결 중...');
  try{localStream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(e){alert('마이크 권한이 필요해요!');hideCallUI();return;}
  pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=e=>{let a=document.getElementById('r-audio');if(!a){a=document.createElement('audio');a.id='r-audio';a.autoplay=true;document.body.appendChild(a);}a.srcObject=e.streams[0];};
  pc.onicecandidate=async e=>{if(e.candidate)await sendSig(room,CU,nick,'candidate',e.candidate);};
  const offer=await pc.createOffer();await pc.setLocalDescription(offer);
  await sendSig(room,CU,nick,'offer',offer);
  sigTimer=setInterval(()=>pollSigs(room,'caller'),1000);
}
async function acceptCall(){
  document.getElementById('inc-call').classList.remove('show');
  if(!callTarget)return;
  const nick=callTarget,room=ck(CU,nick);
  showCallUI(nick,'📞 연결 중...');
  try{localStream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(e){alert('마이크 권한이 필요해요!');hideCallUI();return;}
  pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=e=>{let a=document.getElementById('r-audio');if(!a){a=document.createElement('audio');a.id='r-audio';a.autoplay=true;document.body.appendChild(a);}a.srcObject=e.streams[0];};
  pc.onicecandidate=async e=>{if(e.candidate)await sendSig(room,CU,callTarget,'candidate',e.candidate);};
  sigTimer=setInterval(()=>pollSigs(room,'callee'),1000);
}
async function pollSigs(room,role){
  const sigs=await getSigs(room);
  const newSigs=sigs.filter(s=>s.id>lastSigId&&s.receiver===CU);
  for(const sig of newSigs){
    lastSigId=sig.id;const data=JSON.parse(sig.data);
    if(sig.type==='offer'&&role==='callee'){await pc.setRemoteDescription(new RTCSessionDescription(data));const ans=await pc.createAnswer();await pc.setLocalDescription(ans);await sendSig(room,CU,callTarget,'answer',ans);}
    else if(sig.type==='answer'&&role==='caller'){await pc.setRemoteDescription(new RTCSessionDescription(data));startCallTimer();document.getElementById('call-st').textContent='통화 중';document.getElementById('call-timer').style.display='block';}
    else if(sig.type==='candidate'){try{await pc.addIceCandidate(new RTCIceCandidate(data));}catch(e){}}
    else if(sig.type==='hangup'){endCall(true);}
  }
  if(role==='callee'&&newSigs.find(s=>s.type==='answer')){startCallTimer();document.getElementById('call-st').textContent='통화 중';document.getElementById('call-timer').style.display='block';}
}
function rejectCall(){document.getElementById('inc-call').classList.remove('show');if(callTarget)sendSig(ck(CU,callTarget),CU,callTarget,'hangup',{});callTarget=null;}
async function endCall(remote=false){
  if(!remote&&callTarget)await sendSig(ck(CU,callTarget),CU,callTarget,'hangup',{});
  if(pc){pc.close();pc=null;}if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  if(sigTimer){clearInterval(sigTimer);sigTimer=null;}if(callTimer){clearInterval(callTimer);callTimer=null;}
  callSec=0;isMuted=false;callTarget=null;
  const a=document.getElementById('r-audio');if(a)a.remove();
  hideCallUI();
}
function showCallUI(nick,st){
  const p=gp(nick);const av=document.getElementById('call-av');
  if(p.photo){av.innerHTML=`<img src="${p.photo}">`;}else{av.innerHTML=p.emoji||nick.charAt(0).toUpperCase();av.style.background=avBg(nick);}
  document.getElementById('call-nm').textContent=nick;document.getElementById('call-st').textContent=st;
  document.getElementById('call-timer').style.display='none';document.getElementById('call-screen').classList.add('show');
}
function hideCallUI(){document.getElementById('call-screen').classList.remove('show');}
function startCallTimer(){callTimer=setInterval(()=>{callSec++;const m=String(Math.floor(callSec/60)).padStart(2,'0');const s=String(callSec%60).padStart(2,'0');document.getElementById('call-timer').textContent=m+':'+s;},1000);}
function toggleMute(){isMuted=!isMuted;if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);document.getElementById('mute-btn').textContent=isMuted?'🔇':'🎤';document.getElementById('mute-btn').classList.toggle('muted',isMuted);}
